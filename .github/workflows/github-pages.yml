name: Deploy WASM Site to GitHub Pages (/docs)

on:
  push:
    branches:
      - main

permissions:
  contents: write  # needed to update the docs folder

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java JDK 17
        uses: actions/setup-java@v3
        with:
          distribution: temurin
          java-version: 17

      - name: Enable Gradle caching
        uses: gradle/actions/setup-gradle@v3

      - name: Ensure gradlew is executable
        run: chmod +x ./gradlew

      - name: Build WASM site
        run: ./gradlew wasmJsBrowserDistribution

      - name: Sync built files into docs/
        run: |
          rm -rf docs/*
          cp -r composeApp/build/dist/wasmJs/productionExecutable/. docs/

      - name: Commit and push docs/
        uses: stefanzweifel/git-auto-commit-action@v4
        with:
          commit_message: "Update site via CI"
          branch: main
          file_pattern: "docs/"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}